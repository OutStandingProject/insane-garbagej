<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GarbageJob</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/index.css" />
  </head>
  <body>

    <div id="scene">
      <div id="monitor">

        <div id="monitor-frame">

          <div id="screen-bezel">
            <div id="desktop">

              <div id="menubar">
                <div class="mb-left">
                  <span class="mb-ifruit">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18" aria-label="iFruit" fill="none">
                      <path d="M5.5,24.0819a18.5,18.5,0,0,0,37,0Z" fill="rgba(255,255,255,0.92)" stroke="none"/>
                      <path d="M25.5634,24.0819a8.3813,8.3813,0,0,0-16.7625,0" fill="rgba(255,255,255,0.92)" stroke="none"/>
                      <path d="M39.1991,24.0819a8.3818,8.3818,0,0,0-15.2061-4.866" fill="rgba(255,255,255,0.92)" stroke="none"/>
                      <path d="M16.0846,15.7744c.63-4.7754,12.3331-13.821,21.021-8.966V8.8526s-9.5479.8157-14.4188,8.91" fill="rgba(255,255,255,0.92)" stroke="none"/>
                    </svg>
                  </span>
                  <span class="mb-item mb-bold">GarbageJob</span>
                  <span class="mb-item">File</span>
                  <span class="mb-item">Tasks</span>
                  <span class="mb-item">History</span>
                  <span class="mb-item">Help</span>
                </div>
                <div class="mb-right">
                  <span class="mb-item" id="mbClock">00:00</span>
                </div>
              </div>

              <div id="desktop-area">
                <div id="appWindow" class="win-normal">
                  <div class="titlebar" id="titlebar">
                    <div class="traffic">
                      <span class="btn-red" id="btnRed" title="Close"></span>
                      <span class="btn-yellow" id="btnYellow"></span>
                      <span class="btn-green" id="btnGreen"></span>
                    </div>
                    <div class="titlebar-name">GarbageJob — Sanitation Department</div>
                  </div>

                  <div class="content" id="appContent">
                    <div class="panel sidebar">
                      <div class="hero-image"></div>
                      <div class="profile-row">
                        <div class="avatar"></div>
                        <div>
                          <h2 id="workerName">Victor Goods</h2>
                          <p id="workerJob">Sanitation Worker</p>
                        </div>
                      </div>
                      <div class="divider"></div>
                      <div class="rep-section">
                        <div class="rep-head">
                          <span id="repLabel">Reputation</span>
                          <span id="repText">1,200 / 1,800 XP</span>
                        </div>
                        <div class="rep-bar"><span id="repFill" style="width:66%"></span></div>
                        <div id="levelPill" class="level-pill">Level 1</div>
                      </div>
                      <div class="divider"></div>

                      <!-- LOBBY -->
                      <div class="lobby-section">
                        <div class="section-title" id="lobbyLabel">Lobby</div>
                        <div class="lobby-slots" id="lobbySlots">
                          <div class="lobby-slot empty"><div class="slot-avatar"></div></div>
                          <div class="lobby-slot empty"><div class="slot-avatar"></div></div>
                          <div class="lobby-slot empty"><div class="slot-avatar"></div></div>
                          <div class="lobby-slot empty"><div class="slot-avatar"></div></div>
                        </div>
                      </div>

                      <div class="divider"></div>

                      <!-- TOP 3 RANK -->
                      <div class="rank-section">
                        <div class="section-title" id="rankLabel">Top Reputation</div>
                        <div class="rank-list" id="rankList">
                          <div class="rank-item rank-1">
                            <span class="rank-pos">🥇</span>
                            <span class="rank-name">—</span>
                            <span class="rank-xp">0 XP</span>
                          </div>
                          <div class="rank-item rank-2">
                            <span class="rank-pos">🥈</span>
                            <span class="rank-name">—</span>
                            <span class="rank-xp">0 XP</span>
                          </div>
                          <div class="rank-item rank-3">
                            <span class="rank-pos">🥉</span>
                            <span class="rank-name">—</span>
                            <span class="rank-xp">0 XP</span>
                          </div>
                        </div>
                      </div>

                    </div>

                    <div class="panel tasks">
                      <div class="table-head">
                        <span id="mapsLabel">Maps</span>
                        <span id="titleLabel">Title</span>
                        <span id="levelLabel">Level</span>
                        <span id="rewardsLabel">Rewards</span>
                        <span id="repColLabel">Rep</span>
                        <span id="gpsLabel">GPS</span>
                      </div>
                      <div class="rows" id="rows"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <svg id="monitor-chin-svg"
               xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 1100 56"
               preserveAspectRatio="none"
               aria-hidden="true">
            <defs>
              <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
                <stop offset="0%"   stop-color="#aeaeb2"/>
                <stop offset="8%"   stop-color="#c8c8cc"/>
                <stop offset="22%"  stop-color="#d8d8da"/>
                <stop offset="42%"  stop-color="#e0e0e2"/>
                <stop offset="58%"  stop-color="#dadada"/>
                <stop offset="76%"  stop-color="#c6c6c8"/>
                <stop offset="90%"  stop-color="#b8b8ba"/>
                <stop offset="100%" stop-color="#ababae"/>
              </linearGradient>
              <radialGradient id="ch" cx="50%" cy="45%" rx="40%" ry="70%" gradientUnits="objectBoundingBox">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.38)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
              </radialGradient>
              <linearGradient id="sl" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="rgba(0,0,0,0.18)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
              </linearGradient>
              <linearGradient id="sr" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
              </linearGradient>
              <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#727278"/>
                <stop offset="45%"  stop-color="#525258"/>
                <stop offset="100%" stop-color="#3c3c42"/>
              </linearGradient>
              <clipPath id="cc">
                <path d="M0 0 L1100 0 L1100 42 Q1100 56 1086 56 L14 56 Q0 56 0 42 Z"/>
              </clipPath>
            </defs>
            <g clip-path="url(#cc)">
              <rect x="0" y="0" width="1100" height="56" fill="url(#cg)"/>
              <rect x="0" y="0" width="1100" height="56" fill="url(#ch)"/>
              <rect x="0"    y="0" width="120" height="56" fill="url(#sl)"/>
              <rect x="980"  y="0" width="120" height="56" fill="url(#sr)"/>
              <rect x="0" y="0"   width="1100" height="2"   fill="rgba(20,20,22,0.96)"/>
              <rect x="0" y="2"   width="1100" height="1.2" fill="rgba(255,255,255,0.62)"/>
              <rect x="14" y="53" width="1072" height="2"   fill="rgba(0,0,0,0.12)" rx="1"/>
            </g>
            <g transform="translate(550,28) scale(0.62) translate(-24,-24)" aria-label="iFruit logo">
              <path d="M5.5,24.0819a18.5,18.5,0,0,0,37,0Z" fill="url(#lg)" stroke="none"/>
              <path d="M25.5634,24.0819a8.3813,8.3813,0,0,0-16.7625,0" fill="url(#lg)" stroke="none"/>
              <path d="M39.1991,24.0819a8.3818,8.3818,0,0,0-15.2061-4.866" fill="url(#lg)" stroke="none"/>
              <path d="M16.0846,15.7744c.63-4.7754,12.3331-13.821,21.021-8.966V8.8526s-9.5479.8157-14.4188,8.91" fill="url(#lg)" stroke="none"/>
            </g>
          </svg>

        </div>
      </div>
    </div>

    <script src="./assets/index.js"></script>
  </body>
</html>
